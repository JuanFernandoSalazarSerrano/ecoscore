<!-- waitingforreport.html -->
<div class="min-h-screen bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50 flex items-center justify-center p-6">
  <div class="max-w-lg w-full">
    <!-- Main Card -->
    <div class="bg-white rounded-3xl shadow-2xl shadow-emerald-900/10 border border-emerald-100 overflow-hidden">
      <!-- Top Decorative Bar -->
      <div class="h-2 bg-gradient-to-r from-emerald-400 via-teal-500 to-emerald-500 animate-gradient-shift"></div>

      <div class="p-10 text-center">
        <!-- Animated Icon Container -->
        <div class="relative mx-auto mb-8 w-40 h-40">
          <!-- Pulsing Background Rings -->
          <div class="absolute inset-0 animate-ping rounded-full bg-emerald-200 opacity-20"></div>
          <div class="absolute inset-4 animate-pulse rounded-full bg-emerald-100 opacity-40"></div>

          <!-- Icon Background Circle -->
          <div class="absolute inset-0 flex items-center justify-center">
            <div class="w-36 h-36 rounded-full bg-gradient-to-br from-emerald-50 to-teal-100 flex items-center justify-center shadow-inner">
              <!-- SVG Icon -->
              <svg
                viewBox="0 0 48 48"
                class="w-24 h-24 drop-shadow-lg"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <defs>
                  <linearGradient id="leafGradientWait" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#4ade80" />
                    <stop offset="50%" stop-color="#22c55e" />
                    <stop offset="100%" stop-color="#16a34a" />
                  </linearGradient>
                  <linearGradient id="swooshGradientWait" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#86efac" />
                    <stop offset="100%" stop-color="#22c55e" />
                  </linearGradient>
                </defs>

                <path
                  d="M8 36C12 28 20 18 38 14"
                  stroke="url(#swooshGradientWait)"
                  stroke-width="4"
                  stroke-linecap="round"
                  fill="none"
                />

                <path
                  d="M24 8C24 8 36 12 38 24C40 36 28 42 24 42C20 42 8 36 10 24C12 12 24 8 24 8Z"
                  fill="url(#leafGradientWait)"
                />

                <path
                  d="M24 14V34M24 20L18 26M24 26L30 32"
                  stroke="white"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-opacity="0.6"
                />
              </svg>
            </div>
          </div>

          <!-- Loading Spinner Badge -->
          <div class="absolute -bottom-1 -right-1 w-12 h-12 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-full flex items-center justify-center shadow-lg shadow-emerald-500/30 border-4 border-white">
            <svg class="w-6 h-6 text-white animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </div>
        </div>

        <!-- Title -->
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Generating your report...</h1>

        <!-- Subtitle -->
        <p class="text-gray-500 mb-6">Please wait while we analyze your ecological data.</p>

        <!-- Progress Indicator -->
        <div class="mb-8">
          <div class="h-2 bg-emerald-100 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-emerald-400 to-teal-500 rounded-full animate-progress-indeterminate"></div>
          </div>
          <p class="text-xs text-gray-400 mt-2">Estimated time: {{ estimatedTime }}</p>
        </div>

        <!-- Report Details Card -->
        <div class="bg-gradient-to-r from-emerald-50 to-teal-50 rounded-2xl p-5 mb-8 text-left">
          <div class="flex items-start gap-4">
            <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm shrink-0">
              <svg class="w-5 h-5 text-emerald-600 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
            </div>
            <div class="flex-1">
              <h3 class="font-semibold text-gray-800">{{ reportName }}</h3>
              <p class="text-sm text-gray-600">{{ facilityName }}</p>
              <div class="flex items-center gap-2 mt-2">
                <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-amber-100 text-amber-700 text-xs font-medium">
                  <span class="w-1.5 h-1.5 bg-amber-500 rounded-full animate-pulse"></span>
                  Processing
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Info Message -->
        <div class="flex items-start gap-3 p-4 bg-blue-50 rounded-xl text-left mb-6">
          <svg class="w-5 h-5 text-blue-500 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-sm text-blue-700">
            You can safely close this page. We'll notify you when your report is ready.
          </p>
        </div>

        <!-- Action Button -->
        <a
          class="inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl bg-white border-2 border-emerald-200 text-emerald-700 font-semibold hover:bg-emerald-50 hover:border-emerald-300 transition-all w-full sm:w-auto"
          [routerLink]="['/home']"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          Return to Dashboard
        </a>
      </div>

      <!-- Footer -->
      <div class="bg-gray-50 border-t border-gray-100 px-10 py-4">
        <div class="flex items-center justify-center gap-2 text-sm text-gray-500">
          <svg class="w-4 h-4 text-emerald-500" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
          </svg>
          <span>Powered by <strong class="text-emerald-600">ecoScore</strong></span>
        </div>
      </div>
    </div>

    <!-- Back Link -->
    <div class="mt-6 flex items-center justify-center">
      <a
        class="inline-flex items-center gap-2 rounded-full bg-white px-5 py-2.5 text-sm font-semibold text-emerald-700 shadow-sm shadow-emerald-100 transition hover:-translate-y-0.5 hover:shadow-md"
        [routerLink]="['/home']"
      >
        <span aria-hidden="true">←</span>
        Back to home
      </a>
    </div>
  </div>
</div>
