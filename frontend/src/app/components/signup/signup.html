<div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-emerald-50 via-teal-50 to-sky-50 relative overflow-hidden">
  <!-- Background decorative elements -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-96 h-96 bg-gradient-to-br from-emerald-200/30 to-teal-200/20 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-gradient-to-tr from-teal-200/30 to-emerald-200/20 rounded-full blur-3xl"></div>
    <div class="absolute top-1/4 right-1/4 w-64 h-64 bg-gradient-to-r from-sky-200/20 to-emerald-200/20 rounded-full blur-3xl"></div>
  </div>

  <!-- Sign Up Card -->
  <div class="relative w-full max-w-lg">
    <!-- Glass Card -->
    <div class="backdrop-blur-xl bg-white/80 rounded-3xl shadow-xl shadow-emerald-900/10 border border-white/60 p-8">

      <!-- Logo and Header -->
      <div class="text-center mb-6">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-emerald-500 to-teal-500 shadow-lg shadow-emerald-500/30 mb-4">
          <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
          </svg>
        </div>
        <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-600 to-teal-500 bg-clip-text text-transparent">
          Create Account
        </h1>
        <p class="text-emerald-600/70 mt-2">Join ecoScore and track your sustainability</p>
      </div>

      <!-- Progress Steps -->
      <div class="flex items-center justify-center gap-3 mb-8">
        <div
          class="flex items-center justify-center w-8 h-8 rounded-full text-sm font-semibold transition-all duration-300"
          [class]="currentStep >= 1 ? 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white shadow-md shadow-emerald-500/30' : 'bg-emerald-100 text-emerald-400'"
        >
          1
        </div>
        <div
          class="w-16 h-1 rounded-full transition-all duration-300"
          [class]="currentStep >= 2 ? 'bg-gradient-to-r from-emerald-500 to-teal-500' : 'bg-emerald-100'"
        ></div>
        <div
          class="flex items-center justify-center w-8 h-8 rounded-full text-sm font-semibold transition-all duration-300"
          [class]="currentStep >= 2 ? 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white shadow-md shadow-emerald-500/30' : 'bg-emerald-100 text-emerald-400'"
        >
          2
        </div>
      </div>

      <!-- Sign Up Form -->
      <form (ngSubmit)="onSubmit()">

        <!-- Step 1: Company Details -->
        <div *ngIf="currentStep === 1" class="space-y-4">
          <p class="text-sm font-medium text-emerald-700 mb-4">Company Information</p>

          <!-- Name Field -->
          <div class="space-y-2">
            <label for="name" class="block text-sm font-medium text-emerald-800">
              Company Name <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                </svg>
              </div>
              <input
                type="text"
                id="name"
                [(ngModel)]="formData.name"
                name="name"
                placeholder="Enter company name"
                class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 placeholder-emerald-400/60"
                required
              />
            </div>
          </div>

          <!-- Industry Field -->
          <div class="space-y-2">
            <label for="industry" class="block text-sm font-medium text-emerald-800">
              Industry <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                </svg>
              </div>
              <select
                id="industry"
                [(ngModel)]="formData.industry"
                name="industry"
                class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 appearance-none cursor-pointer"
                required
              >
                <option value="" disabled>Select industry</option>
                <option *ngFor="let ind of industries" [value]="ind">{{ ind }}</option>
              </select>
              <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Website Field -->
          <div class="space-y-2">
            <label for="website" class="block text-sm font-medium text-emerald-800">
              Website <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
                </svg>
              </div>
              <input
                type="url"
                id="website"
                [(ngModel)]="formData.website"
                name="website"
                placeholder="https://example.com"
                class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 placeholder-emerald-400/60"
                required
              />
            </div>
          </div>

          <!-- Description Field -->
          <div class="space-y-2">
            <label for="description" class="block text-sm font-medium text-emerald-800">
              Description
            </label>
            <textarea
              id="description"
              [(ngModel)]="formData.description"
              name="description"
              rows="3"
              placeholder="Brief description of your company and sustainability goals..."
              class="w-full px-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 placeholder-emerald-400/60 resize-none"
            ></textarea>
          </div>

          <!-- Verified Checkbox -->
          <div class="flex items-center gap-3 p-4 rounded-xl bg-emerald-50/50 border border-emerald-100">
            <input
              type="checkbox"
              id="is_verified"
              [(ngModel)]="formData.is_verified"
              name="is_verified"
              class="w-5 h-5 rounded border-emerald-300 text-emerald-500 focus:ring-emerald-400/20 cursor-pointer"
            />
            <label for="is_verified" class="flex items-center gap-2 cursor-pointer">
              <span class="text-emerald-800 font-medium">Request Verification</span>
              <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-600 text-xs font-medium">
                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                  <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                </svg>
                Verified
              </span>
            </label>
          </div>

          <!-- Next Button -->
          <button
            type="button"
            (click)="nextStep()"
            [disabled]="!isStep1Valid"
            class="w-full py-3.5 px-6 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-semibold shadow-lg shadow-emerald-500/30 hover:shadow-xl hover:shadow-emerald-500/40 hover:from-emerald-600 hover:to-teal-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 flex items-center justify-center gap-2 mt-6"
          >
            <span>Continue</span>
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </button>
        </div>

        <!-- Step 2: Location Details -->
        <div *ngIf="currentStep === 2" class="space-y-4">
          <p class="text-sm font-medium text-emerald-700 mb-4">Location Information</p>

          <!-- City Field -->
          <div class="space-y-2">
            <label for="city" class="block text-sm font-medium text-emerald-800">
              City <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
              </div>
              <input
                type="text"
                id="city"
                [(ngModel)]="formData.city"
                name="city"
                placeholder="Enter city"
                class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 placeholder-emerald-400/60"
                required
              />
            </div>
          </div>

          <!-- State Field -->
          <div class="space-y-2">
            <label for="state" class="block text-sm font-medium text-emerald-800">
              State / Province <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
                </svg>
              </div>
              <input
                type="text"
                id="state"
                [(ngModel)]="formData.state"
                name="state"
                placeholder="Enter state or province"
                class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 placeholder-emerald-400/60"
                required
              />
            </div>
          </div>

          <!-- Country Field -->
          <div class="space-y-2">
            <label for="country" class="block text-sm font-medium text-emerald-800">
              Country <span class="text-red-400">*</span>
            </label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
              </div>
              <select
                id="country"
                [(ngModel)]="formData.country"
                name="country"
                class="w-full pl-12 pr-4 py-3 rounded-xl bg-white/70 border border-emerald-200/60 focus:border-emerald-400 focus:ring-2 focus:ring-emerald-400/20 outline-none transition-all duration-200 text-emerald-900 appearance-none cursor-pointer"
                required
              >
                <option value="" disabled>Select country</option>
                <option *ngFor="let c of countries" [value]="c">{{ c }}</option>
              </select>
              <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-emerald-500/60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
            </div>
          </div>

          <!-- Action Buttons -->
          <div class="flex gap-3 mt-6">
            <button
              type="button"
              (click)="prevStep()"
              class="flex-1 py-3.5 px-6 rounded-xl bg-white border border-emerald-200 text-emerald-700 font-semibold hover:bg-emerald-50 transition-all duration-300 flex items-center justify-center gap-2"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
              <span>Back</span>
            </button>
            <button
              type="submit"
              [disabled]="isLoading || !isStep2Valid"
              class="flex-1 py-3.5 px-6 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-semibold shadow-lg shadow-emerald-500/30 hover:shadow-xl hover:shadow-emerald-500/40 hover:from-emerald-600 hover:to-teal-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all duration-300 flex items-center justify-center gap-2"
            >
              <svg *ngIf="isLoading" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              <span>{{ isLoading ? 'Creating...' : 'Create Account' }}</span>
            </button>
          </div>
        </div>
      </form>

      <!-- Divider -->
      <div class="my-6 flex items-center gap-4">
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-emerald-200 to-transparent"></div>
        <span class="text-sm text-emerald-500/70">or</span>
        <div class="flex-1 h-px bg-gradient-to-r from-transparent via-emerald-200 to-transparent"></div>
      </div>

      <!-- Sign In Link -->
      <p class="text-center text-emerald-700">
        Already have an account?
        <a href="#" class="font-semibold text-emerald-600 hover:text-emerald-700 transition-colors">
          Sign In
        </a>
      </p>
    </div>

    <!-- Bottom Badge -->
    <div class="mt-6 text-center">
      <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/60 backdrop-blur-sm border border-emerald-100/60 text-sm text-emerald-600">
        <svg class="w-4 h-4 text-emerald-500" fill="currentColor" viewBox="0 0 24 24">
          <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L6.66,19.7C7.14,19.87 7.64,20 8,20C19,20 22,3 22,3C21,5 14,5.25 9,6.25C4,7.25 2,11.5 2,13.5C2,15.5 3.75,17.25 3.75,17.25C7,8 17,8 17,8Z"/>
        </svg>
        <span>Track your environmental impact with ecoScore</span>
      </div>
    </div>
  </div>
</div>
